<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="760" viewBox="0 0 1240 760">
  <defs>
    <style>
      .bg{fill:#eef3fb}.deck{fill:#fff;stroke:#c7d0df;stroke-width:1.5}.sideLine{stroke:#edf1f7}
      .title{font:800 30px Arial,sans-serif;fill:#111827;writing-mode:vertical-rl;transform:rotate(180deg)}
      .note{font:800 24px Arial,sans-serif;fill:#0f172a}.driver{fill:#fff;stroke:#c7d0df;stroke-width:1.2}.driverText{font:800 15px Arial,sans-serif;fill:#64748b;text-anchor:middle}
      .seat{fill:#fff;stroke:#078b43;stroke-width:2}.sold{fill:#ececf2;stroke:#dedee7;stroke-width:2}
      .label{font:900 15px Arial,sans-serif;fill:#0f172a;text-anchor:middle}.soldLabel{fill:#a8adba}
      .fare{font:700 10px Arial,sans-serif;fill:#64748b;text-anchor:middle}.pillow{fill:#d6f3df}
      .aisle{fill:url(#aislePattern);stroke:#64748b;stroke-width:1;stroke-dasharray:4 4;opacity:.72}
      .legendText{font:900 22px Arial,sans-serif;fill:#0f172a}.smallNote{font:700 15px Arial,sans-serif;fill:#475569}
    </style>
    <pattern id="aislePattern" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#f8fafc"/>
      <rect y="0" width="16" height="7" fill="#d7dee9"/>
    </pattern>
  </defs>
  <rect class="bg" width="1240" height="760"/>
  <text x="44" y="48" class="note">Expected corrected seat map: every seat visible, only the center walkway is empty</text>
  <text x="44" y="74" class="smallNote">Grey = sold/occupied. Green outline = available. Dashed center column = passenger walkway.</text>

  <!-- Lower deck -->
